services:

  # ── Base de datos ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis (caché / jobs) ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}

  # ── Backend FastAPI ──────────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DATABASE_URL:            postgresql+psycopg://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      BACKEND_CORS_ORIGINS:    '["http://${DOMAIN}","https://${DOMAIN}"]'
    depends_on:
      db:
        condition: service_healthy
    # Sin puertos expuestos al host — acceso solo a través de nginx

  # ── Frontend React (build + nginx interno) ───────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    # Sin puertos expuestos al host — acceso solo a través de nginx

  # ── Nginx (reverse proxy público) ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
