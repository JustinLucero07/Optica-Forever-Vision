services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-optica}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-optica}
      POSTGRES_DB: ${DB_NAME:-optica}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-optica} -d ${DB_NAME:-optica}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis-prod-pass}

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.prod
    restart: always
    environment:
      DATABASE_URL: postgresql+psycopg://${DB_USER:-optica}:${DB_PASSWORD:-optica}@db:5432/${DB_NAME:-optica}
      JWT_SECRET: ${JWT_SECRET}
      ENV: production
      BACKEND_CORS_ORIGINS: '["http://localhost","http://127.0.0.1"]'
      WA_TOKEN: ${WA_TOKEN:-}
      WA_PHONE_ID: ${WA_PHONE_ID:-}
      WA_BIRTHDAY_TEMPLATE: ${WA_BIRTHDAY_TEMPLATE:-}
      WA_BIRTHDAY_LANG: ${WA_BIRTHDAY_LANG:-es}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
